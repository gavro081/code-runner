# pods are mongo-0 / mongo-1 / mongo-2, reachable at mongo-<n>.mongo-headless.code-runner.svc.cluster.local

# auth is enabled (root user from app-secret) and a replica set with auth REQUIRES
# inter-member authentication, so each mongod is started with a shared --keyFile
# (the mongodb-replica-set-key from app-secret).
apiVersion: v1
kind: Service
metadata:
  name: mongo-headless
  labels:
    app: mongo
spec:
  clusterIP: None
  # give every pod a DNS A record even before it is Ready, so members can resolve
  # each other while the replica set is being initiated
  publishNotReadyAddresses: true
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  labels:
    app: mongo
spec:
  serviceName: mongo-headless
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      terminationGracePeriodSeconds: 15
      initContainers:
        # A mongod --keyFile must be owned by the mongod user (uid 999 in the
        # official image) and not be group/other readable, or mongod refuses to
        # start
        - name: keyfile-perms
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /tmp/keyfile/mongodb-replica-set-key /keyfile/keyfile
              chmod 400 /keyfile/keyfile
              chown 999:999 /keyfile/keyfile
          volumeMounts:
            - name: keyfile-src
              mountPath: /tmp/keyfile
            - name: keyfile
              mountPath: /keyfile
      containers:
        - name: mongo
          image: mongo:7.0
          args:
            - --replSet
            - rs0
            - --bind_ip_all
            - --keyFile
            - /etc/mongo/keyfile
          ports:
            - containerPort: 27017
              name: mongo
          # creates the root user in the admin db on first init of each pod
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: mongodb-root-password
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: keyfile
              mountPath: /etc/mongo
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: keyfile-src
          secret:
            secretName: app-secret
            items:
              - key: mongodb-replica-set-key
                path: mongodb-replica-set-key
        - name: keyfile
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        # k3d ships a single default StorageClass (local-path); use it implicitly
        resources:
          requests:
            storage: 1Gi
