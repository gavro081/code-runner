# path-based routing, host-agnostic so the SAME manifest works locally and in the cloud:
#   /api -> gateway-service:8080  (no rewrite; gateway predicate is Path=/api/**)
#   /    -> frontend:80
# no `host:` -> Traefik matches on path for ANY Host header. locally still answers on code-runner.localhost; 
# in the cloud it answers on the node's public IP (or <IP>.sslip.io)
# frontend calls a relative /api, so nothing is host-bound.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: code-runner
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
