# pt 7 — single host, path-based routing (Traefik is k3d's built-in controller).
#   /api -> gateway-service:8080  (no rewrite; gateway predicate is Path=/api/**)
#   /    -> frontend:80
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: code-runner
spec:
  ingressClassName: traefik
  rules:
    - host: code-runner.localhost
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
