apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  # credentials the Spring services consume (api-server, gateway, exec).
  # mongodb is a 3-member replica set, so the URI lists all members + replicaSet=rs0.
  # the root user is fixed to 'root' (auth.rootUser in mongodb-values.yaml);
  # authSource=admin because the root user lives in the 'admin' db. <MONGO_PASS> must match mongodb-root-password below.
  SPRING_DATA_MONGODB_URI: "mongodb://root:<MONGO_PASS>@mongo-0.mongo-headless:27017,mongo-1.mongo-headless:27017,mongo-2.mongo-headless:27017/code_execution_db?replicaSet=rs0&authSource=admin"
  SPRING_RABBITMQ_USERNAME: "<RABBIT_USER>"
  SPRING_RABBITMQ_PASSWORD: "<RABBIT_PASS>"
  # credentials the Bitnami MongoDB chart consumes (via auth.existingSecret: app-secret).
  # these key names are dictated by the chart and must be exactly as below.
  mongodb-root-password: "<MONGO_PASS>"        # same value as in the URI above
  mongodb-replica-set-key: "<REPLICA_SET_KEY>" # shared keyfile for inter-member auth
  # credentials for the rabbtimq pod
  RABBITMQ_DEFAULT_USER: "<RABBIT_USER>"
  RABBITMQ_DEFAULT_PASS: "<RABBIT_PASS>"
