apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  # credentials the Spring services consume (api-server, gateway, exec)
  # the URI embeds the Mongo user/pass; authSource=admin because the root user lives in 'admin'.
  SPRING_DATA_MONGODB_URI: "mongodb://<MONGO_USER>:<MONGO_PASS>@mongo:27017/code_execution_db?authSource=admin"
  SPRING_RABBITMQ_USERNAME: "<RABBIT_USER>"
  SPRING_RABBITMQ_PASSWORD: "<RABBIT_PASS>"
  # credentials for the infra pods (mongo / rabbitmq)
  MONGO_INITDB_ROOT_USERNAME: "<MONGO_USER>"
  MONGO_INITDB_ROOT_PASSWORD: "<MONGO_PASS>"
  RABBITMQ_DEFAULT_USER: "<RABBIT_USER>"
  RABBITMQ_DEFAULT_PASS: "<RABBIT_PASS>"
