apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: code-runner

resources:
  - namespace.yaml
  - config.yaml
  - rabbitmq.yaml
  - api-server.yaml
  - gateway.yaml
  - code-execution.yaml
  - frontend.yaml
  - ingress.yaml

helmCharts:
  - name: mongodb
    repo: oci://registry-1.docker.io/bitnamicharts
    version: 19.1.10  
    releaseName: mongo
    namespace: code-runner
    valuesFile: mongodb-values.yaml

# mongo seed ConfigMap, generated from k8s/seed.js (a copy of mongo-init/seed.js — kustomize cannot reference files outside this directory)
# The chart mounts it at /docker-entrypoint-initdb.d on the primary via initdbScriptsConfigMap: mongo-seed
configMapGenerator:
  - name: mongo-seed
    files:
      - seed.js

generatorOptions:
  disableNameSuffixHash: true # keep the name 'mongo-seed' stable (referenced by the chart values)

# single source of truth for image versions. the Deployments reference images without a tag
# command for changing all at once:
# sed -i '' 's/newTag: "1.0.0"/newTag: "1.1.0"/g' k8s/kustomization.yaml
images:
  - name: gavro081/code-runner-api-server
    newTag: "1.1.0"
  - name: gavro081/code-runner-gateway-service
    newTag: "1.1.0"
  - name: gavro081/code-runner-code-execution-service
    newTag: "1.1.0"
  - name: gavro081/code-runner-frontend
    newTag: "1.1.0"
