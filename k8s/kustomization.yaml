apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: code-runner

resources:
  - namespace.yaml
  - config.yaml
  - secret.yaml
  - mongo.yaml
  - rabbitmq.yaml
  - api-server.yaml
  - gateway.yaml
  - code-execution.yaml
  - frontend.yaml
  - ingress.yaml

# mongo seed ConfigMap, generated from k8s/seed.js (a copy of mongo-init/seed.js — kustomize
# cannot reference files outside this directory). mounted at /docker-entrypoint-initdb.d.
configMapGenerator:
  - name: mongo-seed
    files:
      - seed.js

generatorOptions:
  disableNameSuffixHash: true   # keep the name `mongo-seed` stable (referenced by mongo.yaml)

# single source of truth for image versions. the Deployments reference images without a tag
images:
  - name: gavro081/code-runner-api-server
    newTag: "0.3.0"
  - name: gavro081/code-runner-gateway-service
    newTag: "0.3.0"
  - name: gavro081/code-runner-code-execution-service
    newTag: "0.3.0"
  - name: gavro081/code-runner-frontend
    newTag: "0.3.0"
