architecture: replicaset
replicaCount: 3
replicaSetName: rs0

# 3 voting data members already give a majority; no separate arbiter needed.
arbiter:
  enabled: false

# name everything 'mongo' so the headless Service is 'mongo-headless' and the
# pods are mongo-0 / mongo-1 / mongo-2
fullnameOverride: mongo

auth:
  enabled: true
  rootUser: root
  # credentials come from 'app-secret' - charts reads mongodb-root-password and mongodb-replica-set-key
  existingSecret: app-secret

# seed the probblems collection on first init of primary, then replicated towards secondaries
initdbScriptsConfigMap: mongo-seed

persistence:
  enabled: true
  size: 1Gi
  accessModes:
    - ReadWriteOnce
  # k3d ships a single default StorageClass (local-path)
