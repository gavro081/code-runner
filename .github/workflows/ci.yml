name: CI

on:
  push:
    branches: [dev]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'about/**'
      - 'diagrams/**'
      - 'commands/**'
      - 'k8s/**' # k8s manifests don't change the images, so don't rebuild on manifest-only edits
      - '.gitignore'
      - '.idea/**'
  workflow_dispatch: {}

# cancel an in-progress run if the same ref is pushed again
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Compile (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build reactor (common + api-server)
        run: mvn -B -DskipTests install

      - name: Build gateway-service
        run: mvn -B -DskipTests -f gateway-service/pom.xml package

      - name: Build code-execution-service
        run: mvn -B -DskipTests -f code-execution-service/pom.xml package

  build-images:
    name: Build & push ${{ matrix.name }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-server
            context: .
            dockerfile: api-server/Dockerfile
            build-args: ''
          - name: code-execution-service
            context: .
            dockerfile: code-execution-service/Dockerfile
            build-args: ''
          - name: gateway-service
            context: gateway-service
            dockerfile: gateway-service/Dockerfile
            build-args: ''
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            build-args: VITE_API_BASE_URL=
    steps:
      - uses: actions/checkout@v4

      # enables building the arm64 variant on the amd64 runner via emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gavro081/code-runner-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=auto

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # multi-arch so images pull on both amd64 (CI/cloud) and arm64 (local Apple Silicon k3d)
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
