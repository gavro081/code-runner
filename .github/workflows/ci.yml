name: CI

on:
  push:
    branches: [dev]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'about/**'
      - 'diagrams/**'
      - 'commands/**'
      - 'k8s/**' # k8s manifests don't change the images, so don't rebuild on manifest-only edits
      - 'argocd/**' # argo cd config doesn't change the images either
      - '.gitignore'
      - '.idea/**'
  workflow_dispatch: {}

# cancel an in-progress run if the same ref is pushed again
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Compile (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      
      # reactor (common + api-server): also installs 'common' to the local repo,
      # which code-execution-service depends on below.
      - name: Build reactor (common + api-server)
        run: mvn -B -DskipTests install

      - name: Build gateway-service
        run: mvn -B -DskipTests -f gateway-service/pom.xml package

      - name: Build code-execution-service
        run: mvn -B -DskipTests -f code-execution-service/pom.xml package

  build-images:
    # on a plain dev push: build only (amd64, no push) to verify the Dockerfiles still build
    # on v* tags: full multi-arch build and push of the release images
    name: Build ${{ matrix.name }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # api-server & code-execution-service build from the repo root:
          # their Dockerfiles need the 'common' module + root parent pom.
          - name: api-server
            context: .
            dockerfile: api-server/Dockerfile
            build-args: ''
          - name: code-execution-service
            context: .
            dockerfile: code-execution-service/Dockerfile
            build-args: ''
          # gateway-service & frontend are self-contained: build from their own dirs.
          - name: gateway-service
            context: gateway-service
            dockerfile: gateway-service/Dockerfile
            build-args: ''
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            # empty -> relative "/api", proxied by nginx to the gateway
            build-args: VITE_API_BASE_URL=
    steps:
      - uses: actions/checkout@v4

      # enables building the arm64 variant on the amd64 runner via emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        # only needed when we actually push (release tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gavro081/code-runner-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=auto

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # push only on release tags; plain dev pushes just verify the image compiles
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          # multi-arch (amd64 CI/cloud + arm64 local Apple Silicon k3d) only on release tags;
          # plain dev pushes stay single-arch to skip the slow QEMU arm64 emulation
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          # per-service layer cache so the four images don't evict each other
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
